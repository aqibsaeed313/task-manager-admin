<svg xmlns="http://www.w3.org/2000/svg" width="640" height="120" viewBox="0 0 640 120" role="img" aria-label="Task Manager by Reardon">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="65%">
      <stop offset="0" stop-color="#59C3FF" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#1C6BFF" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#0A2A6B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8F6FF"/>
      <stop offset="0.55" stop-color="#7BE0FF"/>
      <stop offset="1" stop-color="#2EA8FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- clock + glow -->
  <g transform="translate(30 16)" filter="url(#softShadow)">
    <circle cx="44" cy="44" r="52" fill="url(#glow)"/>
    <circle cx="44" cy="44" r="40" fill="#EAF4FF" stroke="#113F7A" stroke-width="5"/>
    <circle cx="44" cy="44" r="3.5" fill="#113F7A"/>
    <!-- hands -->
    <path d="M44 44 L44 22" stroke="#113F7A" stroke-width="4" stroke-linecap="round"/>
    <path d="M44 44 L62 54" stroke="#113F7A" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- heartbeat line -->
  <path d="M128 62
           C150 62, 158 62, 172 62
           L188 62
           L198 46
           L210 80
           L222 56
           L234 62
           L610 62"
        fill="none" stroke="#5FE7FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        opacity="0.95"/>
  <path d="M128 62
           C150 62, 158 62, 172 62
           L188 62
           L198 46
           L210 80
           L222 56
           L234 62
           L610 62"
        fill="none" stroke="#138CFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"
        opacity="0.22"/>

  <!-- text -->
  <g transform="translate(155 40)" filter="url(#softShadow)">
    <text x="0" y="0" dominant-baseline="hanging"
      font-family="Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif"
      font-weight="800" font-size="48" fill="#071529">
      Task
    </text>
    <text x="120" y="6" dominant-baseline="hanging"
      font-family="Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif"
      font-weight="800" font-size="36" fill="url(#textBlue)" letter-spacing="1">
      MANAGER
    </text>
    <text x="214" y="54" dominant-baseline="hanging"
      font-family="Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif"
      font-weight="600" font-size="18" fill="#DCEBFF" opacity="0.95">
      By Reardon
    </text>
  </g>
</svg>
